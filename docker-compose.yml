# ============================================================
# ローカル開発環境用 Docker Compose
# ============================================================
# 何をするか: PostgreSQL 16 + Redis 7 をローカルで起動
# なぜ: 本番環境(RDS/ElastiCache)と同等の環境をローカルで再現
# 注意: volumeはdocker_dataに永続化。不要時は docker compose down -v で削除
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: ses-portal-db
    environment:
      POSTGRES_USER: ses_dev
      POSTGRES_PASSWORD: ses_dev_password
      POSTGRES_DB: ses_portal
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 初回起動時にpgcrypto拡張を自動有効化
      - ./migrations/001_extensions_and_functions.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ses_dev -d ses_portal"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ses-portal-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ses-portal-api
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://ses_dev:ses_dev_password@postgres:5432/ses_portal
      - REDIS_URL=redis://redis:6379
      - PORT=3001
      - SYSTEM_TENANT_ID=00000000-0000-0000-0000-000000000001
      - SYSTEM_ADMIN_SECRET=ses-system-2026
      - JWT_SECRET=super-secret-jwt-key-for-local-dev-only
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - MAIL_FROM=${MAIL_FROM}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: ses-portal-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001/api
      - NEXT_PUBLIC_SYSTEM_ADMIN_SECRET=ses-system-2026
      - API_URL=http://api:3001
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
